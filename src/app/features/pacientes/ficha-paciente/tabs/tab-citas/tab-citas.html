<div class="tab-citas">
  <div class="tab-citas__toolbar">
    <ion-segment
      [value]="vistaActiva"
      (ionChange)="onVistaChange($event)"
      mode="md"
      class="citas-vista-segment"
    >
      <ion-segment-button value="lista">
        <ion-icon name="list-outline"></ion-icon>
        <ion-label>Lista</ion-label>
      </ion-segment-button>
      <ion-segment-button value="calendario">
        <ion-icon name="calendar-outline"></ion-icon>
        <ion-label>Calendario</ion-label>
      </ion-segment-button>
    </ion-segment>

    <ion-button fill="clear" (click)="abrirModal()">
      <ion-icon slot="icon-only" name="add-circle-outline"></ion-icon>
    </ion-button>
  </div>

  @if (cargando) {
    <div class="citas-loading">
      <ion-spinner name="crescent"></ion-spinner>
    </div>
  }

  @if (!cargando && vistaActiva === 'lista') {
    <app-citas-lista
      [citas]="citas"
      (editarCita)="abrirModal($event)"
      (confirmarCita)="confirmar($event)"
      (cancelarCita)="cancelar($event)"
      (eliminarCita)="eliminar($event)"
    >
    </app-citas-lista>
  }

  @if (!cargando && vistaActiva === 'calendario') {
    <app-citas-calendario
      [citas]="citas"
      [nutricionistaId]="nutricionistaId"
      (editarCita)="abrirModal($event)"
      (nuevaCita)="abrirModal()"
    >
    </app-citas-calendario>
  }
</div>
