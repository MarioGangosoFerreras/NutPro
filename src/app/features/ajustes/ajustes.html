<ion-header>
  <ion-toolbar>
    <ion-buttons slot="start">
      <div class="hamburger-container" (click)="toggleMenu()">
        <div class="hamburger" [class.is-active]="!collapsed">
          <span class="line"></span>
          <span class="line"></span>
          <span class="line"></span>
        </div>
      </div>
    </ion-buttons>
    <ion-title>Ajustes</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content class="ion-padding">
  <ion-item lines="none">
    <ion-icon
      [name]="conectado ? 'checkmark-circle' : 'logo-google'"
      slot="start"
      [color]="conectado ? 'success' : 'danger'"
    ></ion-icon>
    <ion-label>
      <h3>Google Calendar</h3>
      <p>{{ conectado ? 'Sincronización activa' : 'No conectado' }}</p>
    </ion-label>
    <ion-button
      slot="end"
      [color]="conectado ? 'medium' : 'primary'"
      fill="outline"
      (click)="toggleConexion()"
    >
      {{ conectado ? 'Desconectar' : 'Conectar' }}
    </ion-button>
  </ion-item>
</ion-content>
