<ion-content class="login-content">
  <div class="login-container">
    <div class="login-card">

      <div class="logo-wrapper">
        <img src="img/Logo_app.png" alt="NutPro Logo" class="login-logo">
        <h1 class="brand-title">
          <span class="nut">Nut</span><span class="pro">Pro</span>
        </h1>
        <p class="brand-subtitle">La plataforma para nutricionistas</p>
      </div>

      <div class="form-group">
        <label class="form-label">Email</label>
        <ion-input
          class="form-input"
          type="email"
          [(ngModel)]="email"
          placeholder="tu@email.com"
          fill="outline">
        </ion-input>
      </div>

      <div class="form-group">
        <label class="form-label">Contraseña</label>
        <ion-input
          class="form-input"
          type="password"
          [(ngModel)]="password"
          placeholder="••••••••"
          fill="outline">
        </ion-input>
      </div>

      @if (errorMessage) {
        <div class="error-box">
          <span>{{ errorMessage }}</span>
        </div>
      }

      <ion-button expand="block" class="btn-primary" [disabled]="loading" (click)="onLogin()">
        @if (loading) {
          <ion-spinner name="crescent"></ion-spinner>
        } @else {
          Entrar
        }
      </ion-button>

      <div class="divider">
        <span>¿Nuevo en NutPro?</span>
      </div>

      <ion-button expand="block" fill="outline" class="btn-secondary" routerLink="/register">
        Crear cuenta de nutricionista
      </ion-button>

    </div>
  </div>
</ion-content>
