<ion-content class="login-content">
  <div class="login-container">
    <ion-card class="login-card">
      <div class="logo-wrapper">
        <img src="img/Logo_app.png" alt="NutPro Logo" class="login-logo">
      </div>
      <ion-card-header>
        <ion-card-title class="brand-title">
          <span class="nut">Nut</span><span class="pro">Pro</span>
        </ion-card-title>
        <p>Inicia sesión en tu cuenta</p>
      </ion-card-header>

      <ion-card-content>
        <ion-item>
          <ion-label position="floating">Email</ion-label>
          <ion-input
            type="email"
            [(ngModel)]="email"
            placeholder="tu@email.com">
          </ion-input>
        </ion-item>

        <ion-item>
          <ion-label position="floating">Contraseña</ion-label>
          <ion-input
            type="password"
            [(ngModel)]="password"
            placeholder="••••••••">
          </ion-input>
        </ion-item>

        @if (errorMessage) {
          <ion-text color="danger">
            <p class="error-message">{{ errorMessage }}</p>
          </ion-text>
        }

        <ion-button
          expand="block"
          class="login-button"
          [disabled]="loading"
          (click)="onLogin()">
          @if (loading) {
            <ion-spinner name="crescent"></ion-spinner>
          } @else {
            <span>Entrar</span>
          }
        </ion-button>
      </ion-card-content>
    </ion-card>
  </div>
</ion-content>
