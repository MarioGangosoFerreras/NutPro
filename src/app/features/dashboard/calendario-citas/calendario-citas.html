<ion-header>
  <ion-toolbar>
    <ion-buttons slot="start">
      <div class="hamburger-container" (click)="toggleMenu()">
        <div class="hamburger" [class.is-active]="!collapsed">
          <span class="line"></span>
          <span class="line"></span>
          <span class="line"></span>
        </div>
      </div>
    </ion-buttons>
    <ion-title>Calendario</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content color="light">
  @if (cargandoPagina()) {
    <div class="loading-container">
      <div class="avocado-spinner">🥑</div>
      <p style="color: #2d6a4f; font-weight: 600; margin-top: 10px;">Cargando tu agenda...</p>
    </div>
  } @else {
    <app-universal-calendar mode="full"></app-universal-calendar>
  }
</ion-content>
