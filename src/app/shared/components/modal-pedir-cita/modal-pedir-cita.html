<ion-header class="ion-no-border">
  <ion-toolbar>
    <ion-title>Solicitar Cita</ion-title>
    <ion-buttons slot="end">
      <ion-button (click)="cerrar()">
        <ion-icon slot="icon-only" name="close-outline"></ion-icon>
      </ion-button>
    </ion-buttons>
  </ion-toolbar>
</ion-header>

<ion-content class="ion-padding">
  <div class="info-helper-box">
    <p>
      Selecciona un día y una hora. Tu nutricionista recibirá una notificación para confirmar la
      cita.
    </p>
  </div>

  <ion-item lines="none" class="form-group">
    <ion-label position="stacked">Día de la consulta</ion-label>
    <ion-input type="date" [(ngModel)]="fecha" (ionChange)="cargarDisponibilidad()"></ion-input>
  </ion-item>

  <ion-label class="section-title">Horas disponibles</ion-label>
  <div class="grid-horas">
    @for (hora of slots; track hora) {
      <button
        class="hora-chip"
        [class.selected]="horaSeleccionada === hora"
        [disabled]="horasOcupadas.includes(hora)"
        (click)="horaSeleccionada = hora"
      >
        {{ hora }}
      </button>
    }
  </div>

  <ion-button
    expand="block"
    class="btn-primary"
    [disabled]="!fecha || !horaSeleccionada || guardando"
    (click)="solicitar()"
  >
    @if (guardando) {
      <ion-spinner name="crescent"></ion-spinner>
    } @else {
      Enviar Solicitud
    }
  </ion-button>
</ion-content>
