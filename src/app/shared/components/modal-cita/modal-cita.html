<ion-header>
  <ion-toolbar>
    <ion-title>{{ titulo }}</ion-title>
    <ion-buttons slot="end">
      <ion-button fill="clear" (click)="cancelar()">Cancelar</ion-button>
    </ion-buttons>
  </ion-toolbar>
</ion-header>

<ion-content class="ion-padding">

  <ion-item>
    <ion-label position="stacked">Fecha</ion-label>
    <ion-input type="date" [(ngModel)]="fecha"></ion-input>
  </ion-item>

  <ion-item>
    <ion-label position="stacked">Hora</ion-label>
    <ion-input type="time" [(ngModel)]="hora"></ion-input>
  </ion-item>

  <ion-item>
    <ion-label position="stacked">Duración (minutos)</ion-label>
    <ion-select [(ngModel)]="duracion">
      <ion-select-option [value]="30">30 min</ion-select-option>
      <ion-select-option [value]="45">45 min</ion-select-option>
      <ion-select-option [value]="60">60 min</ion-select-option>
      <ion-select-option [value]="90">90 min</ion-select-option>
    </ion-select>
  </ion-item>

  <ion-item>
    <ion-label position="stacked">Tipo</ion-label>
    <ion-select [(ngModel)]="tipo">
      <ion-select-option value="presencial">Presencial</ion-select-option>
      <ion-select-option value="videollamada">Videollamada</ion-select-option>
    </ion-select>
  </ion-item>

  @if (tipo === 'videollamada') {
    <ion-item>
      <ion-label position="stacked">URL videollamada</ion-label>
      <ion-input type="url" [(ngModel)]="urlVideo" placeholder="https://meet.google.com/..."></ion-input>
    </ion-item>
  }

  <ion-item>
    <ion-label position="stacked">Estado</ion-label>
    <ion-select [(ngModel)]="estado">
      <ion-select-option value="pendiente">Pendiente</ion-select-option>
      <ion-select-option value="confirmada">Confirmada</ion-select-option>
      <ion-select-option value="cancelada">Cancelada</ion-select-option>
    </ion-select>
  </ion-item>

  <ion-item>
    <ion-label position="stacked">Notas</ion-label>
    <ion-textarea [(ngModel)]="notas" rows="3" placeholder="Observaciones..."></ion-textarea>
  </ion-item>

  <ion-button
    expand="block"
    class="ion-margin-top"
    (click)="guardar()"
    [disabled]="guardando || !fecha || !hora"
  >
    @if (guardando) {
      <ion-spinner name="crescent"></ion-spinner>
    } @else {
      {{ esEdicion ? 'Guardar cambios' : 'Crear cita' }}
    }
  </ion-button>

</ion-content>
